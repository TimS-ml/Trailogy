data:
  train_split: train
  val_split: val
  image_size: 224
  num_workers: 12

model:
  backbone: vit_base_patch16_siglip_224
  pretrained: true
  freeze_backbone: false
  drop_path_rate: 0.1

train:
  output_dir: outputs/vit-baseline
  num_train_epochs: 15
  per_device_train_batch_size: 256
  per_device_eval_batch_size: 256
  # sqrt-scaled from the bs64 config (256/64 = 4x -> ~2x LR).
  learning_rate: 6.0e-4
  backbone_learning_rate: 6.0e-5
  weight_decay: 0.05
  warmup_epochs: 1.0
  label_smoothing: 0.1
  dtype: bfloat16
  report_to: none
