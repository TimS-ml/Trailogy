data:
  train_split: train
  val_split: val
  image_size: 224
  num_workers: 8

model:
  backbone: vit_base_patch16_siglip_224
  pretrained: true
  freeze_backbone: false
  drop_path_rate: 0.1

train:
  output_dir: outputs/vit-baseline
  num_train_epochs: 15
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 128
  learning_rate: 3.0e-4
  backbone_learning_rate: 3.0e-5
  weight_decay: 0.05
  warmup_epochs: 1.0
  label_smoothing: 0.1
  dtype: bfloat16
  report_to: none
