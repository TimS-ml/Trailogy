data:
  train_split: train
  val_split: val
  image_size: 384
  num_workers: 12

model:
  backbone: vit_large_patch16_siglip_384.v2_webli
  pretrained: true
  freeze_backbone: false
  drop_path_rate: 0.2

train:
  output_dir: outputs/vit-baseline
  num_train_epochs: 15
  # ViT-L @384 is the heaviest run; halve micro-batch and accumulate to keep
  # the effective batch at 64 within 24 GB.
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 64
  gradient_accumulation_steps: 2
  learning_rate: 3.0e-4
  backbone_learning_rate: 2.0e-5
  weight_decay: 0.05
  warmup_epochs: 1.0
  label_smoothing: 0.1
  dtype: bfloat16
  report_to: none
