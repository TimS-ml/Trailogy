model:
  base_model: "unsloth/gemma-4-E2B-it"
  max_seq_length: 1024
  load_in_4bit: false
  full_finetuning: false
  dtype: bfloat16

lora:
  finetune_vision_layers: false
  finetune_audio_layers: false
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true
  r: 64
  lora_alpha: 64
  lora_dropout: 0.05
  bias: "none"
  random_state: 3407
  tune_projector: true
  projector_learning_rate: 1.0e-4
  tune_last_n_vision_layers: 0
  vision_layers_learning_rate: 1.0e-5

training:
  output_dir: "outputs/local-r64-a64-nokl-30k-v2enrich"

  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8

  num_train_epochs: 10
  max_steps: 30000
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  warmup_steps: 300
  logging_steps: 10
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  report_to: "wandb"
  save_steps: 1000
  save_total_limit: null

  dataloader_num_workers: 8
  dataloader_pin_memory: true
  tf32: true

  eval_strategy: "steps"
  eval_steps: 1000
  # v2enrich captions are ~1062 chars vs v2mix's ~120, so eval batches at
  # the v2mix default (bs=4) OOM at ~step 1000 during the non-plant eval
  # partition (1.37 GiB allocation for vision activations). bs=1 fits
  # with the same ~1 GB headroom train uses. See the 11:03:44 run that
  # crashed at step 1000 mid-eval.
  per_device_eval_batch_size: 1

  modality_aware_sampler: true
  group_by_length: false

data:
  # v2-enrich variant: train stream is mix-50k-v2enrich (long
  # GBIF+Wikipedia captions, ~1062 chars/row vs ~120 in v1/v2). Val
  # files are byte-frozen from v1 via freeze_val_from in
  # mix-50k-v2enrich.yaml, so eval_*_loss is byte-comparable to
  # r64-a64-nokl-local-30k-v2mix runs. Purpose: smoke-test the
  # enrichment pipeline; r=64 chosen because r=256 on Gemma 4 E2B does
  # not fit in 16 GB VRAM (bf16 Adam state alone exceeds capacity).
  train_file: "data/mix-50k-v2enrich/train.jsonl"
  val_file: null
  val_files:
    plant:      "data/mix-50k-v2enrich/val_plant.jsonl"
    nonplant:   "data/mix-50k-v2enrich/val_nonplant.jsonl"
    negative:   "data/mix-50k-v2enrich/val_negative.jsonl"
    offline_qa: "data/mix-50k-v2enrich/val_offline_qa.jsonl"
  max_train_samples: null
  # Cap each val partition at 300 so eval at bs=1 doesn't dominate
  # wall-clock. Full partitions: plant=1125, nonplant=1125,
  # negative=250, offline_qa=4. 300 per partition x bs=1 x ~0.5 s/sample
  # = ~10 min per eval pass; vs uncapped would be ~25 min. Curves stay
  # comparable to v2mix runs IF v2mix also adopts max_val_samples=300
  # for fair comparison (not done here; this is a one-off smoke test).
  max_val_samples: 300
  augmentation: true
  prompt_prefixes:
    camera_on:  "[camera=on] "

eval:
  enabled: true
  max_eval_samples: 300
  max_new_tokens: 256
  use_unsloth: true
  batch_size: 1
  load_in_4bit: false

regularization:
  kl_enabled: false
  kl_weight: 0.0
  kl_temperature: 1.0
  l2_enabled: false
  l2_weight: 1.0e-4
