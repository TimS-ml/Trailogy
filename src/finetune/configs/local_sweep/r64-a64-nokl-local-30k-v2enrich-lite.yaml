model:
  base_model: "unsloth/gemma-4-E2B-it"
  max_seq_length: 1024
  load_in_4bit: false
  full_finetuning: false
  dtype: bfloat16

lora:
  finetune_vision_layers: false
  finetune_audio_layers: false
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true
  r: 64
  lora_alpha: 64
  lora_dropout: 0.05
  bias: "none"
  random_state: 3407
  tune_projector: true
  projector_learning_rate: 1.0e-4
  tune_last_n_vision_layers: 0
  vision_layers_learning_rate: 1.0e-5

training:
  output_dir: "outputs/local-r64-a64-nokl-30k-v2enrich-lite"

  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8

  num_train_epochs: 10
  max_steps: 30000
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  warmup_steps: 300
  logging_steps: 10
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  report_to: "wandb"
  save_steps: 1000
  save_total_limit: null

  dataloader_num_workers: 8
  dataloader_pin_memory: true
  tf32: true

  eval_strategy: "steps"
  eval_steps: 1000
  # v2enrich-lite captions are ~370 chars mean (vs v2enrich's ~810 / v2's
  # ~120). Train/eval can still safely run at bs=2 for train, but eval
  # is kept at bs=1 to mirror the v2enrich run for cross-comparability
  # of eval_*_loss curves.
  per_device_eval_batch_size: 1

  modality_aware_sampler: true
  group_by_length: false

data:
  # v2enrich-lite variant: train stream is mix-50k-v2enrich-lite, which
  # uses the same v2 datamix recipe (na_plantae 30k / llava 7.5k /
  # smoltalk 7.5k / negative 5k / 19 excluded slugs / freeze_val_from
  # v1) but with shorter rich captions (~370 chars/row mean, common
  # name repeated 3x, scientific name 2x). Goal: lift NA-Plantae
  # species-name gradient share above the v2 baseline while keeping
  # enrichment content for mmlu retention.
  train_file: "data/mix-50k-v2enrich-lite/train.jsonl"
  val_file: null
  val_files:
    plant:      "data/mix-50k-v2enrich-lite/val_plant.jsonl"
    nonplant:   "data/mix-50k-v2enrich-lite/val_nonplant.jsonl"
    negative:   "data/mix-50k-v2enrich-lite/val_negative.jsonl"
    offline_qa: "data/mix-50k-v2enrich-lite/val_offline_qa.jsonl"
  max_train_samples: null
  max_val_samples: 300
  augmentation: true
  prompt_prefixes:
    camera_on:  "[camera=on] "

eval:
  enabled: true
  max_eval_samples: 300
  max_new_tokens: 256
  use_unsloth: true
  batch_size: 1
  load_in_4bit: false

regularization:
  kl_enabled: false
  kl_weight: 0.0
  kl_temperature: 1.0
  l2_enabled: false
  l2_weight: 1.0e-4
