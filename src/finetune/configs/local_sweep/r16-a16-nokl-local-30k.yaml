# 30k-step variant at r=16/alpha=16 (LoRA capacity 2x vs r8-a8-nokl-local-30k).
#
# Same dataset, optimizer schedule, and projector-tuning policy as
# r8-a8-nokl-local-30k.yaml; only LoRA rank + alpha are doubled. At
# r=8 + per_device_train_batch_size=2 the vanilla projector-only path
# steady-states near ~13 GB on a 16 GB 4090 laptop; doubling LoRA rank
# adds ~16M LoRA params + their Adam moments (~128 MB) plus a small
# bump in attention activation size, so the run is expected to land
# in the ~13.5-14 GB band — still comfortable on 16 GB.
#
# NO-EVAL: train-time multi-partition eval OOMs on this GPU at
# per_device_eval_batch_size=4 during accelerate's convert_to_fp32
# pass over 256K-vocab logits (observed on r8-a8-nokl-vision2-local at
# step 1000 between the plant and nonplant partitions). Run
# `python -m src.evaluate --config <this yaml> --test_file
# data/mix-50k/val_plant.jsonl` (or any other partition) separately
# after training instead.

model:
  base_model: "unsloth/gemma-4-E2B-it"
  max_seq_length: 1024
  load_in_4bit: false
  full_finetuning: false
  dtype: bfloat16

lora:
  finetune_vision_layers: false
  finetune_audio_layers: false
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true
  r: 16
  lora_alpha: 16                 # alpha/r = 1.0
  lora_dropout: 0.05
  bias: "none"
  random_state: 3407
  tune_projector: true
  projector_learning_rate: 1.4e-4
  tune_last_n_vision_layers: 0   # vision tower frozen
  vision_layers_learning_rate: 1.0e-5

training:
  output_dir: "outputs/local-r16-a16-nokl-30k"

  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8   # eff_bs = 16

  num_train_epochs: 10             # loose upper bound; max_steps wins
  max_steps: 30000
  learning_rate: 3.0e-4
  warmup_ratio: 0.03               # ~900 warmup steps at max_steps=30k
  warmup_steps: 30
  logging_steps: 10
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  report_to: "wandb"
  save_steps: 2000
  save_total_limit: 6

  dataloader_num_workers: 8
  dataloader_pin_memory: true
  tf32: true

  # Disable train-time eval; multi-partition eval OOMs on 16 GB GPU.
  # Run eval separately via `python -m src.evaluate --config <this yaml>`.
  eval_strategy: "no"
  per_device_eval_batch_size: 1

  modality_aware_sampler: true
  group_by_length: false

data:
  train_file: "data/mix-50k/train.jsonl"
  val_file: null
  val_files:
    plant:      "data/mix-50k/val_plant.jsonl"
    nonplant:   "data/mix-50k/val_nonplant.jsonl"
    negative:   "data/mix-50k/val_negative.jsonl"
    offline_qa: "data/mix-50k/val_offline_qa.jsonl"
  max_train_samples: null
  max_val_samples: null
  augmentation: true
  prompt_prefixes:
    camera_on:  "[camera=on] "

eval:
  enabled: true
  max_eval_samples: 300
  max_new_tokens: 256
  use_unsloth: true
  batch_size: 1
  load_in_4bit: false

# No KL: at small rank it suppresses species-name learning.
regularization:
  kl_enabled: false
  kl_weight: 0.0
  kl_temperature: 1.0
  l2_enabled: false
  l2_weight: 1.0e-4
