# Training config: 50K mix (Plant 45 / LLaVA 30 / smoltalk 15 / Negative 10).
#
# This config shrinks the LoRA surface area, freezes the vision tower,
# and turns on KL drift regularization. Intended as a more conservative
# baseline than the prior r=256 / vision-2 runs — trade absolute species
# accuracy for cleaner persona / refusal / generic-Q&A retention.
#
# Active knobs (vs prior r=256 + vision-2 baseline):
#  - lora.r 256 -> 8, lora_alpha 256 -> 16   (tiny LoRA surface)
#  - lora_dropout 0.05                       (promoted from archive_v2 sweep)
#  - tune_projector true, projector_lr 1e-4  (promoted from archive_v2 sweep)
#  - tune_last_n_vision_layers 2 -> 0        (vision tower kept FROZEN)
#  - regularization.kl_enabled true, kl_weight 0.05
#  - regularization.l2_enabled false
#
# Data, sampler, optimizer, schedule, prompt-prefix gate all unchanged
# from prior mix-50k baselines.

model:
  base_model: "unsloth/gemma-4-E2B-it"
  max_seq_length: 1024
  load_in_4bit: false
  full_finetuning: false
  dtype: bfloat16

lora:
  finetune_vision_layers: false
  finetune_audio_layers: false
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true
  r: 8
  lora_alpha: 16
  # v3 knob: lora_dropout 0.0 -> 0.05. Stage-1 baseline4 winner.
  # Regularizes the LoRA path on the ~57-img/species training distribution.
  lora_dropout: 0.05
  bias: "none"
  random_state: 3407
  tune_projector: true
  # v3 knob: projector_lr 5.0e-5 -> 1.0e-4. Stage-1 baseline6 winner.
  # Doubles the cross-modal projector LR (still half of training.learning_rate).
  projector_learning_rate: 1.0e-4
  # Vision tower kept FROZEN (no last-N vision-layer tuning).
  tune_last_n_vision_layers: 0
  vision_layers_learning_rate: 1.0e-5

training:
  output_dir: "outputs/mix-50k-baseline-r8-a16-drop005-fullproj-kl005"
  # bs / gradient_accumulation: v2 baseline7 ran at (16, 1) on PlantNet-only
  # data, but the v3 LLaVA-mix path admits variable-sized incidental images
  # that blow up the vision-tower MLP intermediate buffer for large images.
  # At bs=4 most batches fit but occasionally an LLaVA batch with very
  # large images OOMs (~60 steps in, observed). bs=2 keeps total effective
  # batch at 16 (gas=8) and the per-step vision intermediate ~125 MB —
  # robust to the LLaVA size variance. Future optimization: pre-resize
  # LLaVA images to a max bound at sampling time (mirrors what we do for
  # PlantNet via prepare_plantnet's --resize_to). If you re-enable the KL
  # regularizer below, this setting also gives the teacher forward enough
  # headroom on a 4090 24G.
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 5
  max_steps: null
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  warmup_steps: 234
  logging_steps: 10
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  # report_to: "none" | "wandb" | "tensorboard". Local-file loss curve is
  # always written to {output_dir}/metrics.jsonl by JsonlMetricsCallback,
  # independent of this setting. Set "wandb" to ALSO stream to wandb
  # (project=hikecompanion-finetune, run_name=cfg.training.run_name).
  # On air-gapped boxes export WANDB_MODE=offline before launching.
  # v3: checkpoint every 1000 steps (was 500). 50K rows / batch 16 /
  # 5 epoch = 15,625 steps → ~16 checkpoints → ~3.2 GB disk @ ~200 MB
  # per LoRA+projector+vision-layers ckpt. Keep all (save_total_limit
  # null) so we can pick the best by mid-training eval after the fact.
  save_steps: 1000
  report_to: "none"
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  tf32: true
  save_total_limit: null

  eval_strategy: "steps"
  eval_steps: 1000
  per_device_eval_batch_size: 4

  modality_aware_sampler: true
  group_by_length: false

data:
  train_file: "data/mix-50k/train.jsonl"
  val_file: null
  val_files:
    plant:      "data/mix-50k/val_plant.jsonl"
    nonplant:   "data/mix-50k/val_nonplant.jsonl"
    negative:   "data/mix-50k/val_negative.jsonl"
    # v3: persona watch — 4 records, tracks "I'm an offline AI" persona
    # signal independently of plant-ID / refusal degradation.
    offline_qa: "data/mix-50k/val_offline_qa.jsonl"
  max_train_samples: null
  max_val_samples: null
  augmentation: true
  # v4: camera-state conditional-FT input gate. Prepends a literal
  # marker to the first user turn of every training record, dispatched
  # on image presence (independent of bucket / topic):
  #   record has image     → "[camera=on] "  + user text
  #   record has no image  → "[camera=off] " + user text
  #
  # In the v2 mix:
  #   plant, cambrian, llava  → image-bearing → [camera=on]
  #   smoltalk, offline_qa     → text-only    → [camera=off]
  #   negative                 → mostly text-only → [camera=off]
  #                              (image-grounded refusal records → [camera=on])
  #
  # iOS side (GemmaService) MUST prepend the matching marker:
  #   .vlm  (image captured)  → "[camera=on] "  + user prompt
  #   .text (no image)        → "[camera=off] " + user prompt
  # otherwise prompts miss the gate and the model behaves like base.
  prompt_prefixes:
    camera_on:  "[camera=on] "
    camera_off: "[camera=off] "

eval:
  enabled: true
  max_eval_samples: 300
  max_new_tokens: 256
  use_unsloth: true
  batch_size: 1
  load_in_4bit: false

# KL penalty against base model + L2 weight anchor (toward init).
#
# THIS RUN: kl_enabled=true, l2_enabled=false.
# Previous v3 baseline (r=256 + projector + last-2 vision layers) had to
# disable KL on a 4090 — the teacher forward [B, T, V] bf16 logits
# (~8 GB at B=16/V=262K) plus full forward activations blew the 24 GB
# budget. This config trains far smaller surface area (r=8 LoRA,
# projector still tuned, vision tower FROZEN), so the KL teacher
# forward fits with room to spare under disable_adapter() at the
# existing per_device_train_batch_size=2 / gas=8 setting (effective
# batch 16). L2 left off — KL alone is enough drift control at this
# trainable-param count; L2 mostly redundant once KL is active.
#
# KL semantics: teacher = same model under PEFT disable_adapter() (zero
# extra GPU mem from a second model). kl_weight=0.05 is conservative —
# at typical CE losses in the 1-2 range the KL term contributes 5-10 %
# of total loss after a few hundred steps of drift. Mirrors the
# policy-vs-reference KL used in RLHF / DPO, applied here at SFT time.
#
# L2 semantics (kept for reference, currently disabled): anchors every
# trainable param (LoRA delta + modules_to_save) to its value at
# trainer init. l2_weight=1e-4 keeps the term well below CE in the
# early phase; it grows as the optimizer pushes params further from
# init. For modules_to_save (projector) the snapshot value is the
# pretrained weight, which makes the L2 a "weight-space anchor against
# drift" in the EWC sense.
regularization:
  kl_enabled: true
  kl_weight: 0.05
  kl_temperature: 1.0
  l2_enabled: false
  l2_weight: 1.0e-4
