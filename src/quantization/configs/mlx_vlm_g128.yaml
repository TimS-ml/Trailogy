# MLX VLM quantization, 4-bit, group-size 128 (coarser than baseline).
#
# Coarser group => fewer scales/biases => smaller file, more error.
# Counterpart to ``mlx_vlm_g32.yaml`` for the size/accuracy frontier.
#
# Hardware: Apple Silicon Mac, or Linux + NVIDIA (mlx-cuda-12).
# Loaded by ``run_quant.py --config <this file>``.

method: mlx_vlm_g128

mlx_vlm:
  quantize: true
  q_bits: 4
  q_group_size: 128  # pinned by method name; YAML override is rejected
