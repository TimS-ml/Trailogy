# data_mix/configs/mix-50k-v2enrich-lite.yaml
#
# v2 mix recipe (ratios + exclude list identical to mix-50k-v2.yaml)
# with the NA-Plantae **train** stream sourced from the v2-enrich-lite
# prepared dir: short prose captions (~370 chars mean vs v2enrich's
# ~814) with the common name repeated 3x and the scientific name 2x.
# Built by ``src/data_mix/src/build_enriched_captions.py --mode lite_nameboost``.
#
# What changes vs mix-50k-v2enrich.yaml:
#   * ``na_plantae.train_jsonl`` -> ``inaturalist_na_plantae_prepared_v2enrich_lite/train.jsonl``
#     (caption mean ~370 chars vs v2enrich's ~810; species name repeated
#     to lift its share of the assistant-side loss gradient).
#   * Everything else (bucket counts, temperature, exclude list,
#     llava / smoltalk / negative / offline_qa volumes, freeze_val_from)
#     is identical to mix-50k-v2enrich.yaml.
#
# Why:
#   The G-r64-datamix-v2-v3-v2enrich-comparison.md analysis showed
#   v2enrich's plant regression came from the NA-Plantae token-mass
#   share jumping from ~24 % (v2) to ~67 %, diluting the species-name
#   gradient signal. v2enrich-lite shortens the captions back toward
#   the v2 budget AND repeats the species name to push its share of
#   the per-row gradient above the v2 baseline.
#
# What stays identical to v2:
#   * ``freeze_val_from: "mix-50k"`` — val_*.jsonl are byte-frozen from
#     v1 mix, so eval_<key>_loss is comparable to all earlier v2 runs.
#   * ``na_plantae.val_jsonl`` stays on the v1-style short-caption
#     prepared dir for the same reason.
#   * ``train_exclude_slugs`` — same 19 classes as v2; this is a pure
#     caption-shape ablation, NOT a slug-coverage change.
#
# Total train rows ~ 50,042 — same as v2 / v2enrich.

seed: 42
source: llava

freeze_val_from: "mix-50k"

na_plantae:
  train: 30000
  val: 1500            # ignored when freeze_val_from is set
  train_jsonl: "../data/inaturalist_na_plantae_prepared_v2enrich_lite/train.jsonl"
  val_jsonl:   "../data/inaturalist_na_plantae_prepared/val.jsonl"
  train_temperature: 0.75
  # Identical to mix-50k-v2.yaml / mix-50k-v2enrich.yaml. v2enrich-lite
  # holds slug coverage constant; the only variable is caption shape.
  train_exclude_slugs:
    # 8 systematic-shared-drift victims (D-doc 12k -> 14k table)
    - red_osier_dogwood
    - cutleaf_coneflower
    - bear_s_foot
    - giant_reed
    - catnip
    - texas_mountain_laurel
    - coastal_goldenbush
    - buckbrush
    # confusion partners (the wrong-but-confident predictions at 14k)
    - american_black_elderberry
    - cut_leaved_toothwort
    - bigleaf_maple
    - buttonbush
    - white_vervain
    - texas_persimmon
    - gum_bumelia
    - deerweed
    - golden_yarrow
    - yaupon_holly
    - jojoba

llava:
  train: 7500
  val:   750           # ignored when freeze_val_from is set

smoltalk:
  train: 7500
  val:   375           # ignored when freeze_val_from is set

negative:
  train: 5000
  val:   250           # ignored when freeze_val_from is set

offline_qa:
  path: "assets/data_offline_qa/offline_qa.json"
  val_ratio: 0.1       # ignored when freeze_val_from is set
